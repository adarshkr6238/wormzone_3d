<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wormzone 3D - Multiplayer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;font-family:system-ui,sans-serif;background:#111;touch-action:none}
#gamewrap{position:absolute;top:0;left:0;width:100%;height:100%;display:none}
#ui{position:absolute;top:20px;left:20px;color:#fff;text-shadow:2px 2px 4px #000;pointer-events:none;z-index:100}
#score{font-size:24px;font-weight:bold;color:#ffeb3b}
#hint{font-size:14px;margin-top:5px;opacity:.8}
#conn{position:absolute;top:20px;right:20px;font-size:14px;color:#4caf50;pointer-events:none;z-index:100;background:rgba(0,0,0,.5);padding:8px 16px;border-radius:20px;border:1px solid #4caf50}
#conn.off{color:#f44336;border-color:#f44336}
#sbpanel{position:absolute;top:20px;right:20px;width:280px;background:rgba(0,0,0,.85);border-radius:15px;padding:15px;pointer-events:none;z-index:100;border:1px solid #333;box-shadow:0 4px 20px rgba(0,0,0,.5)}
#sbpanel h3{margin:0 0 15px;color:#ffeb3b;text-align:center;font-size:18px}
.sbe{display:flex;align-items:center;padding:8px 10px;margin:5px 0;border-radius:8px;background:rgba(255,255,255,.05);transition:.2s}
.sbe.me{background:rgba(76,175,80,.2);border:1px solid #4caf50}
.sbe .rk{width:30px;font-weight:bold;font-size:16px}
.sbe .pi{display:flex;align-items:center;flex:1;margin-left:10px}
.sbe .pc{width:16px;height:16px;border-radius:50%;margin-right:10px;border:2px solid #fff}
.sbe .pn{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbe .ps{font-weight:bold;color:#ffeb3b;font-size:16px}
#chatbtn{position:absolute;bottom:20px;left:20px;z-index:200;background:rgba(76,175,80,.9);border:none;color:#fff;padding:12px 20px;font-size:16px;border-radius:30px;cursor:pointer;transition:.2s;box-shadow:0 2px 10px rgba(76,175,80,.3)}
#chatbtn:hover{background:#4caf50;transform:scale(1.05)}
#chatpanel{position:absolute;bottom:70px;left:20px;width:350px;height:300px;background:rgba(0,0,0,.9);border-radius:15px;border:1px solid #333;display:none;flex-direction:column;z-index:200;box-shadow:0 4px 30px rgba(0,0,0,.5)}
#chatpanel.on{display:flex}
.chathdr{padding:15px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center}
.chathdr h3{margin:0;color:#ffeb3b;font-size:16px}
.chatclose{background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:5px}
.chatclose:hover{color:#fff}
#chatlog{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:8px}
.cmsg{padding:8px 12px;background:rgba(255,255,255,.05);border-radius:10px;animation:sl .3s ease}
.cmsg.own{background:rgba(76,175,80,.2);border-left:3px solid #4caf50}
@keyframes sl{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ctm{font-size:11px;color:#888;margin-right:8px}
.cn{font-weight:bold;margin-right:8px}
.ctxt{word-wrap:break-word}
.chatin{display:flex;padding:15px;border-top:1px solid #333}
#chatinput{flex:1;background:rgba(255,255,255,.1);border:1px solid #333;border-radius:20px;padding:12px 16px;color:#fff;font-size:14px;outline:none}
#chatinput:focus{border-color:#4caf50;box-shadow:0 0 10px rgba(76,175,80,.3)}
#chatsend{background:#4caf50;border:none;color:#fff;width:44px;height:44px;border-radius:50%;margin-left:10px;cursor:pointer;font-size:18px;transition:.2s}
#chatsend:hover{background:#45a049;transform:scale(1.1)}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);display:none;justify-content:center;align-items:center;z-index:1000}
.modal.on{display:flex}
.mc{background:linear-gradient(145deg,#1a1a2e,#16213e);border-radius:20px;padding:40px;max-width:500px;width:90%;border:2px solid #4caf50;box-shadow:0 0 50px rgba(76,175,80,.3);animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.mc h2{text-align:center;color:#ffeb3b;margin-bottom:10px;font-size:28px;text-shadow:2px 2px 4px #000}
.mc .sub{text-align:center;color:#aaa;margin-bottom:30px;font-size:14px}
.fg{margin-bottom:25px}
.fg label{display:block;margin-bottom:10px;color:#fff;font-size:16px;font-weight:500}
.fg input[type=text]{width:100%;padding:15px 20px;font-size:18px;border-radius:30px;border:2px solid #333;background:rgba(255,255,255,.1);color:#fff;outline:none;transition:.2s}
.fg input[type=text]:focus{border-color:#4caf50;box-shadow:0 0 20px rgba(76,175,80,.3)}
.cp{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.co{width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.2s;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.co:hover{transform:scale(1.1)}
.co.sel{border-color:#fff;box-shadow:0 0 0 3px #4caf50,0 0 20px rgba(76,175,80,.5);transform:scale(1.1)}
.jb{width:100%;padding:18px;margin-top:30px;background:linear-gradient(135deg,#4caf50,#45a049);border:none;color:#fff;font-size:20px;font-weight:bold;border-radius:30px;cursor:pointer;transition:.2s;text-transform:uppercase;letter-spacing:1px}
.jb:hover{transform:scale(1.02);box-shadow:0 5px 25px rgba(76,175,80,.5)}
.jb:active{transform:scale(.98)}
#go{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.9);color:#fff;padding:40px;border-radius:20px;text-align:center;display:none;border:2px solid #ff4081;box-shadow:0 0 40px rgba(255,64,129,.5);z-index:1000;pointer-events:auto;min-width:300px}
#go h1{margin-top:0;color:#ff4081;font-size:32px}
#fscore{font-size:24px;color:#ffeb3b;font-weight:bold}
#restartBtn{background:#ff4081;border:none;color:#fff;padding:15px 40px;font-size:18px;border-radius:30px;cursor:pointer;margin-top:20px;transition:.1s}
#restartBtn:active{transform:scale(.95)}
#winov{position:absolute;top:30%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.95);color:#ffd700;padding:40px 60px;border-radius:20px;text-align:center;font-size:36px;font-weight:bold;text-shadow:3px 3px 6px rgba(0,0,0,.8);display:none;z-index:1001;animation:pulse 1s infinite;border:2px solid #ffd700}
@keyframes pulse{0%{transform:translateX(-50%) scale(1);box-shadow:0 0 20px rgba(255,215,0,.5)}50%{transform:translateX(-50%) scale(1.05);box-shadow:0 0 40px rgba(255,215,0,.8)}100%{transform:translateX(-50%) scale(1);box-shadow:0 0 20px rgba(255,215,0,.5)}}
#tl,#tr{flex:1;pointer-events:auto;background:rgba(255,255,255,.03)}
#tl:active,#tr:active{background:rgba(255,255,255,.1)}
#tl::before{content:"←";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;color:rgba(255,255,255,.2);pointer-events:none}
#tr::before{content:"→";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;color:rgba(255,255,255,.2);pointer-events:none}
#infobar{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#ccc;padding:10px 20px;border-radius:20px;font-size:13px;pointer-events:none;z-index:100}
@media(max-width:768px){
  #sbpanel{right:10px;left:10px;width:auto;top:10px}
  #chatpanel{left:10px;right:10px;width:auto;bottom:70px;height:250px}
  .mc{padding:25px}
  .cp{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>
<div class="modal" id="joinModal">
  <div class="mc">
    <h2>🐍 Enter the Arena</h2>
    <p class="sub">Choose your name and snake color</p>
    <div class="fg">
      <label for="pname">Your Name</label>
      <input type="text" id="pname" placeholder="Enter your name" maxlength="15" autocomplete="off">
    </div>
    <div class="fg">
      <label>Snake Color</label>
      <div class="cp" id="colorPicker"></div>
    </div>
    <button class="jb" id="joinBtn">JOIN BATTLE 🚀</button>
  </div>
</div>

<div id="gamewrap">
  <div id="ui">
    <div id="score">Score: 0</div>
    <div id="hint">A/D or ←/→ to turn • C: Camera • Enter: Chat</div>
  </div>
  <div id="sbpanel"><h3>🏆 LEADERBOARD</h3><div id="scoreboard"><div style="color:#666;text-align:center;padding:10px">Waiting for players...</div></div></div>
  <button id="chatbtn">💬 Chat</button>
  <div id="chatpanel">
    <div class="chathdr"><h3>💬 Chat</h3><button class="chatclose" onclick="toggleChat()">×</button></div>
    <div id="chatlog"></div>
    <div class="chatin"><input type="text" id="chatinput" placeholder="Type a message..." maxlength="100"><button id="chatsend">➤</button></div>
  </div>
  <div id="conn">⭐ Connecting...</div>
  <div id="winov"></div>
  <div id="go"><h1>GAME OVER</h1><p>Your Final Score: <span id="fscore">0</span></p><button id="restartBtn">PLAY AGAIN</button></div>
  <div id="mctrl"><div id="tl"></div><div id="tr"></div></div>
  <div id="infobar">🎮 Wormzone 3D Multiplayer - Last Snake Standing Wins!</div>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module" src="deno-deploy-game.js"></script>
</body>
</html>
