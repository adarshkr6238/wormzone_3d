<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplayer 3D Snake - Wormzone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #111; 
            touch-action: none;
        }
        
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }
        
        /* UI Overlay */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 100;
        }
        
        #score-board {
            font-size: 24px;
            font-weight: bold;
            color: #ffeb3b;
        }
        
        #controls-hint {
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.8;
        }
        
        /* Connection Status */
        #connection-status {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 14px;
            color: #4CAF50;
            pointer-events: none;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #4CAF50;
        }
        
        #connection-status.disconnected {
            color: #f44336;
            border-color: #f44336;
        }
        
        /* Scoreboard */
        #scoreboard-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 280px;
            background: rgba(0,0,0,0.85);
            border-radius: 15px;
            padding: 15px;
            pointer-events: none;
            z-index: 100;
            border: 1px solid #333;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        #scoreboard-panel h3 {
            margin: 0 0 15px 0;
            color: #ffeb3b;
            text-align: center;
            font-size: 18px;
        }
        
        .scoreboard-entry {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            margin: 5px 0;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        
        .scoreboard-entry.me {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
        }
        
        .scoreboard-entry .rank {
            width: 30px;
            font-weight: bold;
            font-size: 16px;
        }
        
        .scoreboard-entry .player-info {
            display: flex;
            align-items: center;
            flex: 1;
            margin-left: 10px;
        }
        
        .scoreboard-entry .player-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 10px;
            border: 2px solid white;
        }
        
        .scoreboard-entry .player-name {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .scoreboard-entry .player-score {
            font-weight: bold;
            color: #ffeb3b;
            font-size: 16px;
        }
        
        /* Chat System */
        #chat-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 200;
            background: rgba(76, 175, 80, 0.9);
            border: none;
            color: white;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 10px rgba(76, 175, 80, 0.3);
        }
        
        #chat-btn:hover {
            background: #4CAF50;
            transform: scale(1.05);
        }
        
        #chat-panel {
            position: absolute;
            bottom: 70px;
            left: 20px;
            width: 350px;
            height: 300px;
            background: rgba(0,0,0,0.9);
            border-radius: 15px;
            border: 1px solid #333;
            display: none;
            flex-direction: column;
            z-index: 200;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }
        
        #chat-panel.active {
            display: flex;
        }
        
        .chat-header {
            padding: 15px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header h3 {
            margin: 0;
            color: #ffeb3b;
            font-size: 16px;
        }
        
        .chat-close {
            background: none;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
        }
        
        .chat-close:hover {
            color: #fff;
        }
        
        #chat-log {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .chat-message {
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            animation: slideIn 0.3s ease;
        }
        
        .chat-message.own {
            background: rgba(76, 175, 80, 0.2);
            border-left: 3px solid #4CAF50;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chat-time {
            font-size: 11px;
            color: #888;
            margin-right: 8px;
        }
        
        .chat-name {
            font-weight: bold;
            margin-right: 8px;
        }
        
        .chat-text {
            word-wrap: break-word;
        }
        
        .chat-input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #333;
        }
        
        #chat-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        
        #chat-input:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }
        
        #chat-send {
            background: #4CAF50;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            margin-left: 10px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }
        
        #chat-send:hover {
            background: #45a049;
            transform: scale(1.1);
        }
        
        /* Name/Color Selection Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            border: 2px solid #4CAF50;
            box-shadow: 0 0 50px rgba(76, 175, 80, 0.3);
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .modal-content h2 {
            text-align: center;
            color: #ffeb3b;
            margin-bottom: 10px;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .modal-content .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
        }
        
        .form-group input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 18px;
            border-radius: 30px;
            border: 2px solid #333;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            transition: all 0.2s;
        }
        
        .form-group input[type="text"]:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
        }
        
        .color-picker {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
        }
        
        .color-option {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .color-option:hover {
            transform: scale(1.1);
        }
        
        .color-option.selected {
            border-color: #fff;
            box-shadow: 0 0 0 3px #4CAF50, 0 0 20px rgba(76, 175, 80, 0.5);
            transform: scale(1.1);
        }
        
        .join-btn {
            width: 100%;
            padding: 18px;
            margin-top: 30px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .join-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 25px rgba(76, 175, 80, 0.5);
        }
        
        .join-btn:active {
            transform: scale(0.98);
        }
        
        /* Game Over */
        #game-over {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); 
            color: white; 
            padding: 40px; 
            border-radius: 20px;
            text-align: center; 
            display: none; 
            border: 2px solid #ff4081; 
            box-shadow: 0 0 40px rgba(255, 64, 129, 0.5);
            z-index: 1000; 
            pointer-events: auto;
            min-width: 300px;
        }
        
        #game-over h1 { 
            margin-top: 0; 
            color: #ff4081; 
            font-size: 32px;
        }
        
        #final-score {
            font-size: 24px;
            color: #ffeb3b;
            font-weight: bold;
        }
        
        #restart-btn {
            background: #ff4081; 
            border: none; 
            color: white; 
            padding: 15px 40px;
            font-size: 18px; 
            border-radius: 30px; 
            cursor: pointer; 
            margin-top: 20px;
            transition: transform 0.1s;
        }
        
        #restart-btn:active { 
            transform: scale(0.95); 
        }
        
        /* Winner Overlay */
        #winner-overlay {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.95);
            color: #ffd700;
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            display: none;
            z-index: 1001;
            animation: pulse 1s infinite;
            border: 2px solid #ffd700;
        }
        
        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
            50% { transform: translateX(-50%) scale(1.05); box-shadow: 0 0 40px rgba(255, 215, 0, 0.8); }
            100% { transform: translateX(-50%) scale(1); box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        }
        
        /* Mobile Controls */
        #mobile-controls {
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 50%;
            display: flex; 
            pointer-events: none;
        }
        
        .touch-zone { 
            flex: 1; 
            pointer-events: auto; 
            background: rgba(255,255,255,0.03);
        }
        
        .touch-zone:active { 
            background: rgba(255,255,255,0.1); 
        }
        
        #touch-left::before {
            content: "←";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: rgba(255,255,255,0.2);
            pointer-events: none;
        }
        
        #touch-right::before {
            content: "→";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: rgba(255,255,255,0.2);
            pointer-events: none;
        }
        
        /* Info Bar */
        #info-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #ccc;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            pointer-events: none;
            z-index: 100;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            #scoreboard-panel {
                right: 10px;
                left: 10px;
                width: auto;
                top: 10px;
            }
            
            #chat-panel {
                left: 10px;
                right: 10px;
                width: auto;
                bottom: 70px;
                height: 250px;
            }
            
            .modal-content {
                padding: 25px;
            }
            
            .color-picker {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Name/Color Selection Modal -->
    <div class="modal-overlay" id="name-color-modal">
        <div class="modal-content">
            <h2>🐍 Enter the Arena</h2>
            <p class="subtitle">Choose your name and snake color</p>
            
            <div class="form-group">
                <label for="player-name">Your Name</label>
                <input type="text" id="player-name" placeholder="Enter your name" maxlength="15" autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Snake Color</label>
                <div class="color-picker" id="color-options"></div>
            </div>
            
            <button class="join-btn" id="join-btn">JOIN BATTLE 🚀</button>
        </div>
    </div>
    
    <div id="game-container">
        <div id="ui">
            <div id="score-board">Score: 0</div>
            <div id="controls-hint">A/D or ←/→ to turn • C: Camera • Enter: Chat</div>
        </div>
        
        <!-- Scoreboard -->
        <div id="scoreboard-panel">
            <h3>🏆 LEADERBOARD</h3>
            <div id="scoreboard">
                <div style="color: #666; text-align: center; padding: 10px;">Waiting for players...</div>
            </div>
        </div>
        
        <!-- Chat Button -->
        <button id="chat-btn">💬 Chat</button>
        
        <!-- Chat Panel -->
        <div id="chat-panel">
            <div class="chat-header">
                <h3>💬 Chat</h3>
                <button class="chat-close" onclick="toggleChat()">×</button>
            </div>
            <div id="chat-log"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message..." maxlength="100">
                <button id="chat-send">➤</button>
            </div>
        </div>
        
        <div id="connection-status">⭐ Connecting...</div>
        
        <div id="winner-overlay"></div>
        
        <div id="game-over">
            <h1>GAME OVER</h1>
            <p>Your Final Score: <span id="final-score">0</span></p>
            <button id="restart-btn">PLAY AGAIN</button>
        </div>

        <div id="mobile-controls">
            <div class="touch-zone" id="touch-left"></div>
            <div class="touch-zone" id="touch-right"></div>
        </div>
        
        <div id="info-bar">🎮 Wormzone 3D Multiplayer - Last Snake Standing Wins!</div>
    </div>

    <!-- Three.js CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="deno-deploy-game.js"></script>
</body>
</html>
