<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplayer 3D Snake - Wormzone</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #111; 
            touch-action: none;
        }
        
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 100;
        }
        
        #score-board {
            font-size: 24px;
            font-weight: bold;
            color: #ffeb3b;
        }
        
        #players-list {
            font-size: 16px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .player-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
            pointer-events: auto;
        }
        
        .player-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 10px;
            border: 2px solid white;
        }
        
        #controls-hint {
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.8;
        }
        
        #game-over {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); 
            color: white; 
            padding: 40px; 
            border-radius: 20px;
            text-align: center; 
            display: none; 
            border: 2px solid #ff4081; 
            box-shadow: 0 0 30px rgba(255, 64, 129, 0.5);
            z-index: 1000; 
            pointer-events: auto;
        }
        
        #game-over h1 {
            margin-top: 0; 
            color: #ff4081; 
        }
        
        #restart-btn {
            background: #ff4081; 
            border: none; 
            color: white; 
            padding: 12px 30px;
            font-size: 18px; 
            border-radius: 30px; 
            cursor: pointer; 
            margin-top: 20px;
            transition: transform 0.1s; 
            pointer-events: auto;
        }
        
        #restart-btn:active {
            transform: scale(0.95);
        }

        #name-input {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            display: block;
        }
        
        #name-input h2 {
            margin-top: 0;
            color: #ffeb3b;
        }
        
        #name-input input {
            padding: 12px 20px;
            font-size: 18px;
            border-radius: 30px;
            border: none;
            margin: 15px 0;
            width: 80%;
            max-width: 300px;
        }
        
        #name-input button {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s;
        }
        
        #name-input button:active {
            transform: scale(0.95);
        }

        #winner-overlay {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: #ffd700;
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            display: none;
            z-index: 1001;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
            100% { transform: translateX(-50%) scale(1); }
        }

        /* Mobile Controls Overlay */
        #mobile-controls {
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 50%;
            display: flex; 
            pointer-events: none;
        }
        
        .touch-zone {
            flex: 1; 
            pointer-events: auto;
            background: rgba(255,255,255,0.05);
        }
        
        .touch-zone:active {
            background: rgba(255,255,255,0.15);
        }
        
        #touch-left::before {
            content: "←";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: rgba(255,255,255,0.3);
            pointer-events: none;
        }
        
        #touch-right::before {
            content: "→";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: rgba(255,255,255,0.3);
            pointer-events: none;
        }
        
        #connection-status {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 14px;
            color: #4CAF50;
            pointer-events: none;
            z-index: 100;
        }
        
        #connection-status.disconnected {
            color: #f44336;
        }
    </style>
</head>
<body>
    <div id="name-input">
        <h2>Enter Your Name</h2>
        <input type="text" id="player-name" placeholder="Your Name" maxlength="20">
        <button id="join-btn">Join Game</button>
    </div>
    
    <div id="game-container">
        <div id="ui">
            <div id="score-board">Score: 0</div>
            <div id="players-list"></div>
            <div id="controls-hint">Tap Left/Right | 'C' to Change Camera</div>
            <button id="log-btn" style="margin-top:5px; padding:4px 8px; font-size:14px;">Show Logs</button>
        </div>
        <pre id="log-output" style="display:none; position:absolute; bottom:0; left:0; width:100%; height:150px; background:#111; color:#0f0; overflow:auto; z-index:1000; margin:0; padding:5px; font-size:12px;"></pre>
        
        <div id="connection-status">⭐ Connecting...</div>
        
        <div id="winner-overlay"></div>
        
        <div id="game-over">
            <h1>GAME OVER</h1>
            <p>Your Final Score: <span id="final-score">0</span></p>
            <button id="restart-btn">PLAY AGAIN</button>
        </div>

        <div id="mobile-controls">
            <div class="touch-zone" id="touch-left"></div>
            <div class="touch-zone" id="touch-right"></div>
        </div>
    </div>

    <!-- Three.js CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="multiplayer-game.js"></script>
</body>
</html>
