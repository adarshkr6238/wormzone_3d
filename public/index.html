<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Snake - Wormzone Style</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; }
        #score-board { font-size: 24px; font-weight: bold; color: #ffeb3b; }
        #controls-hint { font-size: 14px; margin-top: 5px; opacity: 0.8; }
        
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); color: white; padding: 40px; border-radius: 20px;
            text-align: center; display: none; border: 2px solid #ff4081; box-shadow: 0 0 30px rgba(255, 64, 129, 0.5);
            z-index: 1000; pointer-events: auto;
        }
        #game-over h1 { margin-top: 0; color: #ff4081; }
        #restart-btn {
            background: #ff4081; border: none; color: white; padding: 12px 30px;
            font-size: 18px; border-radius: 30px; cursor: pointer; margin-top: 20px;
            transition: transform 0.1s; pointer-events: auto;
        }
        #restart-btn:active { transform: scale(0.95); }

        /* Mobile Controls Overlay */
        #mobile-controls {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            display: flex; pointer-events: none;
        }
        .touch-zone { flex: 1; pointer-events: auto; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score-board">Score: 0</div>
        <div id="controls-hint">Tap Left/Right | 'C' to Change Camera</div>
        <button id="cam-btn" style="pointer-events: auto; margin-top: 10px; background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 10px; border-radius: 5px;">Switch Camera (C)</button>
        <a href="/multiplayer" style="pointer-events: auto; margin-top: 10px; display: block; background: rgba(0, 200, 255, 0.2); border: 1px solid #00bcd4; color: #00bcd4; padding: 5px 10px; border-radius: 5px; text-decoration: none; font-size: 14px;">👥 Play Multiplayer</a>
    </div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <p>Your Final Score: <span id="final-score">0</span></p>
        <button id="restart-btn" onclick="window.location.reload()">PLAY AGAIN</button>
    </div>

    <div id="mobile-controls">
        <div class="touch-zone" id="touch-left"></div>
        <div class="touch-zone" id="touch-right"></div>
    </div>

    <!-- Three.js CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
